    <style>
        /* Loading spinner styles */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 16px;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Error message styles */
        .error-message {
            text-align: center;
            color: #e74c3c;
            padding: 20px;
            font-size: 16px;
        }

        /* Fixed card size styles */
        .work-item {
            width: 100%;
            height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .work-img-wrapp {
            width: 100%;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .work-img {
            width: 300px;
            height: 300px;
            object-fit: contain;
        }

        .work-category {
            line-height: 1.3;
            height: 38px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Work item hover effects */
        .work-item:hover {
            transform: translateY(-5px);
            transition: transform 0.3s ease;
        }

        .work-item:hover .work-img {
            transform: scale(1.05);
            transition: transform 0.3s ease;
        }
    </style>
</head>

    <script>
        // MERN Backend API Configuration
        const API_BASE_URL = 'https://nexaura-control.onrender.com/api';

        // Function to fetch organisations from MERN backend
        async function fetchOrganisations() {
            try {
                const response = await fetch(`${API_BASE_URL}/organisations?status=Active`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message || 'Failed to fetch organisations');
                }

                return result.data;
            } catch (error) {
                console.error('Error fetching organisations:', error);
                throw error;
            }
        }

        // Function to create work item HTML
        function createWorkItemHTML(org) {
            // Use logo (base64) or fallback to default
            const logoUrl = org.logo || 'images/default-work.jpg';

            // Format services array
            const servicesText = org.services && org.services.length > 0
                ? org.services.map(item => item.service).join(', ')
                : 'Creative Services';

            return `
                <div role="listitem" class="w-dyn-item">
  <a
    data-w-id="darkyn08"
    href="single-work.html?org_code=${org.orgCode}"
    title="View ${org.name} - ${servicesText}"
    class="work-item w-inline-block"
    style="
      opacity: 1;
      transform: translate3d(0px, 0px, 0px) scale3d(1, 1, 1);
      transform-style: preserve-3d;

      /* 🔥 glass card styling */
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    "
  >
    <div class="work-img-wrapp">
      <img
        src="${logoUrl}"
        alt="${org.name}"
        class="work-img"
        onerror="this.src='images/default-work.jpg'"
        style="border-radius: 12px;"
      />
    </div>

    <h5
      class="raw-heading"
      
      title="${org.name}"
    >
      ${org.name}
    </h5>
  </a>
</div>

            `;
        }

        // Function to display error message
        function showError(message) {
            const workList = document.getElementById('work-list');
            workList.innerHTML = `
                <div class="error-message">
                    <p>${message}</p>
                    <button onclick="loadWorks()" style="margin-top: 10px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        Try Again
                    </button>
                </div>
            `;
        }

        // Function to hide loading spinner
        function hideLoading() {
            const loadingSpinner = document.getElementById('loading-spinner');
            if (loadingSpinner) {
                loadingSpinner.remove();
            }
        }

        // Main function to load and display works
        async function loadWorks() {
            const workList = document.getElementById('work-list');

            // Show loading spinner
            workList.innerHTML = `
                <div class="loading-spinner" id="loading-spinner">
                    <div class="spinner"></div>
                    <span>Loading our works...</span>
                </div>
            `;

            try {
                // Fetch all organisations from MERN backend
                const organisations = await fetchOrganisations();

                if (!organisations || organisations.length === 0) {
                    showError('No works found at the moment. Please check back later.');
                    return;
                }

                // Hide loading spinner
                hideLoading();

                // Create work items HTML
                let workItemsHTML = '';

                // Process each organisation
                organisations.forEach(org => {
                    workItemsHTML += createWorkItemHTML(org);
                });

                // Update the work list
                workList.innerHTML = workItemsHTML;

                // Add animation to work items
                const workItems = document.querySelectorAll('.work-item');
                workItems.forEach((item, index) => {
                    item.style.opacity = '0';
                    item.style.transform = 'translateY(20px)';

                    setTimeout(() => {
                        item.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                        item.style.opacity = '1';
                        item.style.transform = 'translateY(0px)';
                    }, index * 100);
                });

                console.log(`✅ Successfully loaded ${organisations.length} works `);

            } catch (error) {
                console.error('Error loading works:', error);
                showError('Unable to load works. Please try again.');
            }
        }

        // Load works when page loads
        document.addEventListener('DOMContentLoaded', function () {
            loadWorks();
        });

        // Optional: Add refresh functionality
        function refreshWorks() {
            loadWorks();
        }

        // Optional: Auto-refresh every 5 minutes
        // setInterval(refreshWorks, 300000);
    </script>
